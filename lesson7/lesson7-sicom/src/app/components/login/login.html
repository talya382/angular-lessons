<div class="login-container">
  
  <div class="login-box">
    <h2>🔐 התחברות לחנות</h2>
    
    <div class="form-group">
      <label for="username">שם משתמש:</label>
      <input 
        id="username"
        type="text" 
        [(ngModel)]="username" 
        placeholder="הזיני שם משתמש"
        (keyup.enter)="login()" />
    </div>

    <div class="form-group">
      <label for="password">סיסמה:</label>
      <input 
        id="password"
        type="password" 
        [(ngModel)]="password" 
        placeholder="הזיני סיסמה"
        (keyup.enter)="login()" />
    </div>

    <button (click)="login()" class="login-btn">
      התחברי 🚀
    </button>

    <!-- הודעת שגיאה -->
    <p *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </p>

    <p class="hint">
      💡 רמז: שם משתמש וסיסמה הם 1234
    </p>
  </div>

</div>
